# fly.toml app configuration file generated for converge-sync on 2026-06-11T13:54:37-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'converge-sync'
primary_region = 'iad'

[build]
  dockerfile = 'apps/server/Dockerfile'

[deploy]
  release_command = 'node dist/migrate.js'

[env]
  PORT = '8787'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
