services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: converge
      POSTGRES_PASSWORD: converge
      POSTGRES_DB: converge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U converge -d converge"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
